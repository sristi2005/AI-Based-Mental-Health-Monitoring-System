<!DOCTYPE html>
<html>
<head>
  <title>Check‑In Result</title>

  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #ffffff;
      font-family: "Segoe UI", Arial, sans-serif;
      text-align: center;
      padding: 60px;
      min-height: 100vh;
    }

    .card {
      background: linear-gradient(145deg, #0b1220, #020617);
      padding: 45px 40px;
      border-radius: 18px;
      display: inline-block;
      max-width: 520px;
      box-shadow:
        0 0 40px rgba(99, 102, 241, 0.15),
        inset 0 0 20px rgba(255, 255, 255, 0.02);
      animation: fadeIn 0.8s ease;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #60a5fa;
      font-weight: 500;
    }

    p {
      color: #cbd5f5;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    a {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 34px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #ffffff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 0 18px rgba(99, 102, 241, 0.35);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 26px rgba(99, 102, 241, 0.55);
      background: linear-gradient(135deg, #6366f1, #818cf8);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Check‑In Result</h1>

    <h2>Stress Level: {{ stress_level }}</h2>

    <p>
      This result is based on your interaction patterns during the check‑in.
      Small habits like mindful breaks, regular sleep, and expressing your
      thoughts can help maintain emotional balance.
    </p>

    <a href="{{ url_for('checkin') }}">Do Another Check‑In</a>
  </div>

</body>
</html>
